<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->
     <link rel="icon" href="./src/assets/images/sx_logo.jpg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SyndicationX</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("portal-theme");
          var dark =
            stored === "dark" ||
            (!stored &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          root.setAttribute("data-theme", dark ? "dark" : "light");
          root.classList.add(dark ? "dark" : "light");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.classList.add("light");
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
